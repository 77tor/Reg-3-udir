<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartlegging i Regning - Kommer snart</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #e3f2fd 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            border-top: 8px solid #4db6ac;
        }

        h1 {
            color: #00796b;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #546e7a;
            margin-bottom: 2rem;
        }

        .status-box {
            background-color: #f1f8e9;
            padding: 1rem;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 2rem;
            border: 1px dashed #8bc34a;
        }

        .math-symbols {
            font-size: 1.5rem;
            color: #4db6ac;
            font-weight: bold;
            letter-spacing: 15px;
            margin: 1rem 0;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }

        .footer {
            font-size: 0.9rem;
            color: #90a4ae;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="math-symbols">+ − × ÷ = %</div>
        
        <h1>Udirs kartlegging i regning</h1>
        <p class="subtitle">Her bygger vi øve-prøve for kartlegging på 3. trinn!</p>
        
        <div class="status-box">
            <strong>Status:</strong> Siden er under utbygging og kommer snart.
        </div>

        <p>Vi jobber med å lage gode øve-oppgaver for både elever og lærere.</p>
        
        <div class="footer">
            &copy; 2026 Kartlegging i Regning - Hold ut, vi regner oss frem til åpning!
        </div>
    </div>

</body>
</html>
